name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Release ${{ github.ref_name }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/**
            agents/*.md
            protocol/schema.md
            README.md
            README.ko.md
            LICENSE
