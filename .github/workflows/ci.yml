name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  lint-knip:
    name: Knip (dead code)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint:knip

  lint-deps:
    name: Dep-cruiser (architecture invariants)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint:deps

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck

  format:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run format:check

  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    strategy:
      matrix:
        node: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
      - run: npm ci
      - run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  validate-schemas:
    name: Validate JSON Schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npx -y ajv-cli@5 compile -s 'protocol/schemas/**/*.json' || true
        # Soft validation for now; will be enforced once schemas are finalized.

  check-agents-md:
    name: Check agents/*.md present
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify required sandwich files
        run: |
          # v3: engineering-lead.md split into builder.md + verifier.md.
          # v3.3: researcher promoted from inline-read specialist to standalone actor
          #       so multimodal video understanding can bind to gemini-sdk independently.
          # See wiki/concepts/bagelcode-system-architecture-v3.md §3 + AGENTS.md §"Actors".
          for f in agents/coordinator.md agents/planner-lead.md agents/researcher.md agents/builder.md agents/verifier.md agents/builder-fallback.md; do
            test -f "$f" || (echo "Missing required sandwich: $f" && exit 1)
          done
          # game-design.md is the binding contract inline-read by 4+ actors.
          test -f agents/specialists/game-design.md || (echo "Missing game-design contract" && exit 1)
          echo "All 6 sandwich files + game-design contract present (v3.3)"
