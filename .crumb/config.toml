# Crumb runtime configuration — v0.1 schema (model-config.ts loader format).
#
# Override layer on top of preset binding. Resolve order ([[bagelcode-system-architecture-v0.1]] §5.1, extended):
#   1. .crumb/config.toml (this file)        ← user override
#   2. preset.actors.<name>.{harness, provider, model}
#   3. preset.[defaults]
#   4. ambient (entry host)
#   5. system fallback (claude-code + claude-opus-4-7)
#
# Every actor defaults to effort="high" — backed by Snell et al. ICLR 2025
# "Scaling LLM Test-Time Compute Optimally" (test-time compute 4× ≈ 14× pretrain).
# Verifier especially: CourtEval Critic/Defender step is where extended thinking
# pays the largest dividend (ACL 2025 +12.4% multi-role agreement uplift).
#
# Effort → provider-specific spawn params (see src/config/model-config.ts mapEffort):
#   low  → reasoning.effort=low,    thinking_budget=8000
#   med  → reasoning.effort=medium, thinking_budget=24000
#   high → reasoning.effort=high,   thinking_budget=64000
#
# NL-editable via `crumb model "<instruction>"` / TUI / `crumb_model` MCP tool.
# See wiki/synthesis/bagelcode-scoring-ratchet-frontier-2026-05-02.md for backing.

[defaults]
effort = "high"

[providers."claude-local"]
enabled = true

[providers."codex-local"]
enabled = true

[providers."gemini-cli-local"]
enabled = true

# v0.3.1 default — every actor uses the user's local entry host (claude-code in
# Claude Code sessions). This keeps a fresh checkout single-auth: the user only
# needs the host they already have, no codex / gemini login required to demo.
# Cross-provider runs remain available via `crumb run --preset bagelcode-cross-3way`,
# which overrides builder → codex + verifier → gemini-cli at session-start time.
# This file is the user-overridable seed; per-session presets win when chosen.

# Coordinator is a quick-thinking router (TradingAgents §4.3 split: routing
# = quick-think model, deep reasoning = deep-think model). Hub-Ledger-Spoke
# routing decisions are 1–2 turn lookups against the transcript head — they
# don't benefit from extended thinking. Haiku ≈10× cheaper + 3–5× faster
# than Opus, and the routing quality difference is empirically negligible
# for our 43-kind decision tree. Per-actor `crumb model` override still works.
[actors."coordinator"]
harness = "claude-code"
model = "claude-haiku-4-5"
effort = "low"

[actors."planner-lead"]
harness = "claude-code"
model = "claude-opus-4-7"
effort = "high"

[actors."builder"]
harness = "claude-code"
model = "claude-opus-4-7"
effort = "high"

# Verifier extended thinking — highest leverage actor per Snell ICLR 2025.
# Defaults to ambient claude-code so a single-auth checkout works; switch via
# `crumb model "verifier 모델을 gemini-3-1-pro 로"` or `--preset bagelcode-cross-3way`
# when cross-provider self-bias mitigation is desired.
[actors."verifier"]
harness = "claude-code"
model = "claude-opus-4-7"
effort = "high"
