# sdk-enterprise (production-grade, opt-in)
#
# Anthropic Managed Agents-style direct SDK orchestration.
# API key 필요 (3 vendor: Anthropic + OpenAI + Google).
# Notion/Rakuten/Sentry 가 쓰는 production-grade pattern.
# OAuth ban 영향 0 — Commercial ToS 따름.

[meta]
name = "sdk-enterprise"
description = "Anthropic Managed Agents-style direct SDK orchestration (API key 필요, production-grade, Notion/Rakuten/Sentry pattern)"
recommended = false
requires_api_keys = ["ANTHROPIC_API_KEY", "OPENAI_API_KEY", "GEMINI_API_KEY"]
schema = "crumb/v3"

[actors.coordinator]
sandwich = "agents/coordinator.md"
harness  = "anthropic-sdk"
provider = "anthropic"
model    = "claude-haiku-4-5"
auth     = "api-key"

[actors.planner-lead]
sandwich = "agents/planner-lead.md"
harness  = "anthropic-sdk"
provider = "anthropic"
model    = "claude-sonnet-4-6"
auth     = "api-key"

[actors.builder]
sandwich = "agents/builder.md"
harness  = "openai-sdk"
provider = "openai"
model    = "gpt-5.5-codex"
auth     = "api-key"

[actors.verifier]
sandwich = "agents/verifier.md"
harness  = "google-sdk"
provider = "google"
model    = "gemini-2.5-pro"
auth     = "api-key"

[actors.builder-fallback]
sandwich = "agents/builder-fallback.md"
harness  = "anthropic-sdk"
provider = "anthropic"
model    = "claude-sonnet-4-6"
auth     = "api-key"

[effects.qa_check]
tool     = "qa-check-effect@v1"
harness  = "none"
provider = "none"

[skills]
tdd_iron_law                  = "skills/tdd-iron-law.md"
verification_before_completion = "skills/verification-before-completion.md"
code_review_protocol          = "skills/code-review-protocol.md"
parallel_dispatch             = "skills/parallel-dispatch.md"
subagent_spawn                = "skills/subagent-spawn.md"

[specialists.planner-lead]
concept   = "agents/specialists/concept-designer.md"
research  = "agents/specialists/researcher.md"
design    = "agents/specialists/visual-designer.md"

[verifier]
mode                     = "courteval"
adaptive_stop_threshold  = 1.0
sub_steps                = ["grader", "critic", "defender", "regrader"]

[routing]
flow                = ["coordinator", "planner-lead", "builder", "qa_check", "verifier"]
escalate_on_fail    = "builder-fallback"
escalate_on_stuck   = 5
adaptive_stop       = true
