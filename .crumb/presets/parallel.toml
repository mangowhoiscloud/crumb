# --parallel: Codex + Claude Code 동시 builder (vendor diversity demo)

[agents.coordinator]
adapter = "claude-local"
model = "claude-haiku-4-5"

[agents.planner-lead]
adapter = "claude-local"
model = "claude-sonnet-4-6"

[agents.engineering-lead]
adapter = "codex-local"
model = "gpt-5.5"

[agents.builder-fallback]
adapter = "claude-local"
model = "claude-sonnet-4-6"

[parallel]
enabled = true
both_builders_on_spec = true
verifier_compares = true
