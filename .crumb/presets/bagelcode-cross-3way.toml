# bagelcode-cross-3way (★ default, recommended)
#
# 메일 verbatim 정조준: "Claude Code, Codex, Gemini CLI 등 다양한 에이전트를 동시에 사용".
# coordinator/planner-lead = ambient (entry harness 따라감).
# builder    = Codex                 (구현)
# verifier   = Gemini CLI            (검증, multimodal screenshot grading)
# researcher = Gemini SDK (v0.3.0, ★)  (gameplay video → mechanic extraction;
#                                     gemini-cli has p1-unresolved video bugs,
#                                     so the SDK route is the deterministic path
#                                     for native YouTube URL ingestion @ 10fps)
# cross-provider self-bias mitigation (NeurIPS 2024 self-recognition cure).
#
# Resolve order (per [[bagelcode-system-architecture-v0.1]] §5.1):
#   1. preset.actors.<name>.{harness, model} 명시 사용
#   2. preset.[defaults] block (없음)
#   3. ambient (entry host 따라감) ← 이 preset 의 default
#   4. system fallback (claude-code + claude-sonnet-4-6)

[meta]
name = "bagelcode-cross-3way"
description = "베이글코드 신작팀 (Claude Code + Codex + Gemini CLI 동시 사용 환경) 정조준 default"
recommended = true
schema = "crumb/v0.1"

# coordinator: 명시 없음 → ambient
[actors.coordinator]
sandwich = "agents/coordinator.md"
# harness, provider, model 모두 ambient 따라감

# planner-lead: 명시 없음 → ambient
[actors.planner-lead]
sandwich = "agents/planner-lead.md"

# researcher (v0.3.0 → v0.3.1): NO explicit harness binding. The reducer's
# pickAdapter('researcher') routes by goal.data.video_refs presence:
#   - has video_refs → gemini-sdk (deterministic frame sampling; gemini-cli has
#     4 closed/p1-unresolved video bugs #1556/#1691/#3379/#15634, so SDK-direct
#     is the only reliable path)
#   - no video_refs  → claude-local (LLM-driven text research per
#     agents/researcher.md step 1+3 fallback — real wiki references + design
#     lessons, not the v0.3.0 stub which emitted empty arrays).
# Removing the binding lets one preset serve both modes; users who want to
# FORCE gemini-sdk regardless can override via .crumb/config.toml.
[actors.researcher]
sandwich = "agents/researcher.md"
# harness/provider/model: ambient → pickAdapter routes per video_refs

# builder: ★ 명시 — 구현 = OpenAI Codex
[actors.builder]
sandwich = "agents/builder.md"
harness  = "codex"
provider = "openai"
model    = "gpt-5.5-codex"

# verifier: ★ 명시 — 검증 = Google Gemini (multimodal screenshot grading)
# v0.3.0 model bump: 2.5-pro → 3.1-pro (10fps frame sampling for fast action,
# 1M input context, parity with researcher's video evidence stream).
[actors.verifier]
sandwich = "agents/verifier.md"
harness  = "gemini-cli"
provider = "google"
model    = "gemini-3-1-pro"

# PR-Prune-2: builder-fallback actor removed. circuit OPEN handling now swaps
# adapter_override.builder = 'claude-local' on the same builder actor, so a
# Codex outage transparently falls back to Claude-Code with the SAME sandwich.

# Effects (deterministic, no LLM)
[effects.qa_check]
tool     = "qa-check-effect@v1"
harness  = "none"
provider = "none"

# Skills (procedural workflow, sandwich 가 inline read)
[skills]
tdd_iron_law                  = "skills/tdd-iron-law.md"
verification_before_completion = "skills/verification-before-completion.md"
code_review_protocol          = "skills/code-review-protocol.md"
parallel_dispatch             = "skills/parallel-dispatch.md"
subagent_spawn                = "skills/subagent-spawn.md"

# Specialists (planner-lead 내부 step inline; v0.3.0: research 는 별도 actor 로 분리됨)
[specialists.planner-lead]
concept = "agents/specialists/concept-designer.md"
design  = "agents/specialists/visual-designer.md"
# game-design.md (envelope + video evidence schema + DESIGN.md synth format) 는
# 4 actor 가 inline-read 하는 binding contract — researcher / planner-lead /
# builder / verifier 모두 사용.
contract = "agents/specialists/game-design.md"

# Verifier mode (CourtEval inline 4 sub-step)
[verifier]
mode                     = "courteval"
adaptive_stop_threshold  = 1.0
sub_steps                = ["grader", "critic", "defender", "regrader"]

# Routing rules ([[bagelcode-system-architecture-v0.1]] §8.1, v0.3.0 researcher inserted)
# Two-phase planner: phase A (Socratic + Concept) → researcher (video evidence) →
# phase B (resumed planner: Design + Synth) → builder → qa_check → verifier.
[routing]
flow              = ["coordinator", "planner-lead", "researcher", "planner-lead", "builder", "qa_check", "verifier"]
escalate_on_fail  = "adapter-swap"  # PR-Prune-2: swap builder adapter to claude-local on circuit OPEN
escalate_on_stuck = 5
adaptive_stop     = true
