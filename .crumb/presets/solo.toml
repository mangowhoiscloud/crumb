# solo — Anthropic Claude Max 만 (단일 host)
#
# 평가자가 Codex / Gemini 미로그인일 때 fallback.
# 모든 actor = ambient (entry harness 따라감 — 보통 claude-code).
# Cross-provider 효과 없음 (self-bias risk warn). 단순 셋업.

[meta]
name = "solo"
description = "단일 host (Claude Max only). Codex / Gemini 미로그인 시 안전. self-bias risk warn."
recommended = false
requires_cli = ["claude"]
schema = "crumb/v0.1"

# 모든 actor: 명시 없음 → ambient (보통 claude-code)
[actors.coordinator]
sandwich = "agents/coordinator.md"

[actors.planner-lead]
sandwich = "agents/planner-lead.md"

[actors.builder]
sandwich = "agents/builder.md"

[actors.verifier]
sandwich = "agents/verifier.md"

[actors.builder-fallback]
sandwich = "agents/builder-fallback.md"

[effects.qa_check]
tool     = "qa-check-effect@v1"
harness  = "none"
provider = "none"

[skills]
tdd_iron_law                  = "skills/tdd-iron-law.md"
verification_before_completion = "skills/verification-before-completion.md"
code_review_protocol          = "skills/code-review-protocol.md"
parallel_dispatch             = "skills/parallel-dispatch.md"
subagent_spawn                = "skills/subagent-spawn.md"

[specialists.planner-lead]
concept   = "agents/specialists/concept-designer.md"
research  = "agents/specialists/researcher.md"
design    = "agents/specialists/visual-designer.md"

[verifier]
mode                     = "courteval"
adaptive_stop_threshold  = 1.0
sub_steps                = ["grader", "critic", "defender", "regrader"]

[routing]
flow                = ["coordinator", "planner-lead", "builder", "qa_check", "verifier"]
escalate_on_fail    = "builder-fallback"
escalate_on_stuck   = 5
adaptive_stop       = true
